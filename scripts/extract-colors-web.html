<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Color Extractor</title>
    <script src="https://cdn.jsdelivr.net/npm/colorthief@2.3.2/dist/color-thief.umd.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #3E5F44, #5E936C);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 {
            color: #3E5F44;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #5E936C;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 3px dashed #93DA97;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            background: #E8FFD7;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 30px;
        }
        .upload-area:hover {
            background: #d4f5b8;
            border-color: #5E936C;
        }
        .upload-area.dragover {
            background: #c4e5a8;
            border-color: #3E5F44;
        }
        input[type="file"] {
            display: none;
        }
        .results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .result-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .result-card h3 {
            color: #3E5F44;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .color-palette {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        .color-swatch {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: #333;
            font-weight: bold;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.8);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .color-swatch:hover {
            transform: scale(1.1);
        }
        .color-swatch.dark {
            color: white;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
        }
        .preview-image {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .copy-btn {
            background: #5E936C;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 12px;
        }
        .copy-btn:hover {
            background: #3E5F44;
        }
        .code-block {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            margin-top: 15px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Logo Color Extractor</h1>
        <p class="subtitle">Upload your logo to extract its color palette</p>
        
        <div class="upload-area" id="uploadArea">
            <p style="font-size: 18px; margin-bottom: 10px;">📤 Drop logo image here or click to upload</p>
            <p style="color: #5E936C; font-size: 14px;">Supports: PNG, JPG, SVG</p>
            <input type="file" id="fileInput" accept="image/*" multiple>
        </div>

        <div class="results" id="results"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const results = document.getElementById('results');
        const colorThief = new ColorThief();

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        extractColors(e.target.result, file.name);
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        function extractColors(imageSrc, fileName) {
            const img = new Image();
            img.crossOrigin = 'Anonymous';
            img.onload = () => {
                try {
                    const dominantColor = colorThief.getColor(img);
                    const palette = colorThief.getPalette(img, 5);
                    
                    displayResults(fileName, imageSrc, dominantColor, palette);
                } catch (error) {
                    console.error('Error extracting colors:', error);
                    alert('Error extracting colors. Make sure the image is loaded.');
                }
            };
            img.src = imageSrc;
        }

        function rgbToHex(r, g, b) {
            return '#' + [r, g, b].map(x => {
                const hex = x.toString(16);
                return hex.length === 1 ? '0' + hex : hex;
            }).join('').toUpperCase();
        }

        function getLuminance(r, g, b) {
            return (0.299 * r + 0.587 * g + 0.114 * b) / 255;
        }

        function displayResults(fileName, imageSrc, dominant, palette) {
            const card = document.createElement('div');
            card.className = 'result-card';
            
            const allColors = [dominant, ...palette];
            const uniqueColors = Array.from(
                new Map(allColors.map(c => [rgbToHex(...c), c])).values()
            );

            let html = `
                <h3>${fileName}</h3>
                <img src="${imageSrc}" class="preview-image" alt="${fileName}">
                <div class="color-palette">
            `;

            uniqueColors.forEach(color => {
                const hex = rgbToHex(...color);
                const rgb = `rgb(${color.join(', ')})`;
                const isDark = getLuminance(...color) < 0.5;
                
                html += `
                    <div class="color-swatch ${isDark ? 'dark' : ''}" 
                         style="background-color: ${hex};"
                         title="${hex} - ${rgb}"
                         onclick="copyToClipboard('${hex}')">
                        <div>${hex}</div>
                        <div style="font-size: 9px; margin-top: 4px;">${rgb}</div>
                    </div>
                `;
            });

            html += '</div>';

            // Generate code snippet
            const colorsForCode = uniqueColors.slice(0, 5).map(c => rgbToHex(...c));
            html += `
                <div class="code-block">
                    <strong>Suggested theme colors:</strong><br>
                    <pre>export const logoColors = {
  primary: '${colorsForCode[0] || ''}',
  secondary: '${colorsForCode[1] || ''}',
  accent: '${colorsForCode[2] || ''}',
  highlight: '${colorsForCode[3] || ''}',
  muted: '${colorsForCode[4] || ''}',
};</pre>
                    <button class="copy-btn" onclick="copyCode(this)">Copy Code</button>
                </div>
            `;

            card.innerHTML = html;
            results.appendChild(card);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert(`Copied: ${text}`);
            });
        }

        function copyCode(btn) {
            const code = btn.previousElementSibling.textContent;
            navigator.clipboard.writeText(code).then(() => {
                btn.textContent = '✓ Copied!';
                setTimeout(() => {
                    btn.textContent = 'Copy Code';
                }, 2000);
            });
        }
    </script>
</body>
</html>
